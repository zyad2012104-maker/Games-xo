<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>X-O المتطورة - لعبة إكس أو الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- كود Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8584077826935053" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 5px;
        }
        
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        /* ===== تنسيقات الإعلانات ===== */
        .top-ad, .bottom-ad {
            margin-bottom: 12px;
            border-radius: 10px;
            overflow: hidden;
            background: #f8f9fa;
            position: relative;
            width: 100%;
        }
        
        .ad-wrapper {
            position: relative;
            width: 100%;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .ad-badge {
            position: absolute;
            top: 3px;
            right: 5px;
            background: #ff4444;
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 8px;
            z-index: 10;
            font-weight: 600;
        }
        
        .ad-close {
            position: absolute;
            top: 3px;
            left: 5px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 10;
        }
        
        /* ===== الإعلانات الجانبية - تظهر فقط في الكمبيوتر ===== */
        .left-ads-sidebar, .right-ads-sidebar {
            display: none; /* مخفية افتراضياً */
        }
        
        /* ===== المحتوى الرئيسي ===== */
        .game-main-content {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .game-title h1 {
            font-size: 20px;
            background: linear-gradient(135deg, #2b5797, #1e3f6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .version-badge {
            background: #ffb900;
            color: #1e3f6e;
            padding: 2px 8px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 5px;
        }
        
        .back-to-home {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 5px 10px;
            background: #f0f0f0;
            color: #333;
            text-decoration: none;
            border-radius: 20px;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .back-to-home:hover {
            background: #2b5797;
            color: white;
        }
        
        /* لوحة التحكم */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
        }
        
        .control-group {
            width: 100%;
        }
        
        .control-group label {
            display: block;
            margin-bottom: 3px;
            color: #2b5797;
            font-weight: 600;
            font-size: 13px;
        }
        
        .custom-select select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }
        
        /* لوحة النتائج */
        .score-panel {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .player-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            flex: 1;
        }
        
        .player-card.player-x {
            background: linear-gradient(135deg, #2b5797, #1e3f6e);
            color: white;
        }
        
        .player-card.player-o {
            background: linear-gradient(135deg, #d83b01, #a52a00);
            color: white;
        }
        
        .player-icon {
            font-size: 24px;
        }
        
        .player-label {
            font-size: 11px;
            opacity: 0.9;
        }
        
        .player-score {
            font-size: 20px;
            font-weight: 700;
        }
        
        .vs-badge {
            background: #ffb900;
            color: #1e3f6e;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        /* لوحة اللعبة */
        .game-board-area {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        
        .board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
        }
        
        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        
        .turn-player {
            font-size: 18px;
            font-weight: 700;
        }
        
        .moves-indicator {
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        
        /* شبكة اللعبة */
        .board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 280px;
        }
        
        .board-inner {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
        }
        
        .board-grid {
            display: grid;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 12px;
        }
        
        .board-grid[data-size="3"] {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .board-grid[data-size="4"] {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .board-grid[data-size="5"] {
            grid-template-columns: repeat(5, 1fr);
        }
        
        .board-grid[data-size="6"] {
            grid-template-columns: repeat(6, 1fr);
        }
        
        .cell {
            aspect-ratio: 1;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(28px, 5vw);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        
        .cell:active {
            transform: scale(0.95);
        }
        
        .cell.x {
            color: #2b5797;
        }
        
        .cell.o {
            color: #d83b01;
        }
        
        .cell.win {
            animation: winPulse 1s infinite;
        }
        
        @keyframes winPulse {
            0%, 100% { background: #d4edda; }
            50% { background: #a8e0b5; }
        }
        
        /* إعلان الأدوار */
        .turn-ad-container {
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .turn-ad-container.hidden {
            display: none;
        }
        
        .turn-ad {
            position: relative;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .ad-close-small {
            position: absolute;
            top: 3px;
            left: 3px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 10px;
            z-index: 10;
        }
        
        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .btn-primary, .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #28a745, #218838);
            color: white;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #545b62);
            color: white;
        }
        
        .btn-secondary:active {
            transform: scale(0.98);
        }
        
        /* الإحصائيات السريعة */
        .quick-stats {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }
        
        .stat-icon {
            font-size: 14px;
        }
        
        .stat-label {
            color: #666;
        }
        
        .stat-value {
            font-weight: 700;
            color: #2b5797;
        }
        
        /* ===== تصميم لأجهزة الكمبيوتر ===== */
        @media (min-width: 1024px) {
            body {
                padding: 20px;
            }
            
            .game-wrapper {
                display: flex;
                gap: 20px;
            }
            
            .left-ads-sidebar, .right-ads-sidebar {
                display: flex; /* تظهر في الكمبيوتر */
                width: 160px;
                flex-direction: column;
                gap: 20px;
            }
            
            .ad-vertical-card, .ad-square-card {
                background: white;
                border-radius: 15px;
                overflow: hidden;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                position: relative;
                min-height: 250px;
            }
            
            .ad-badge-vertical, .ad-badge-square {
                position: absolute;
                top: 5px;
                right: 5px;
                background: #ff4444;
                color: white;
                font-size: 10px;
                padding: 2px 6px;
                border-radius: 10px;
                z-index: 2;
            }
            
            .ad-vertical-content, .ad-square-content {
                width: 100%;
                height: 100%;
                min-height: inherit;
                background: #f5f5f5;
            }
            
            .game-main-content {
                padding: 25px;
            }
            
            .game-title h1 {
                font-size: 28px;
            }
            
            .control-panel {
                flex-direction: row;
            }
            
            .action-buttons {
                flex-direction: row;
                justify-content: center;
            }
            
            .btn-primary, .btn-secondary {
                width: auto;
                padding: 12px 30px;
            }
            
            .board-grid[data-size="3"] {
                grid-template-columns: repeat(3, 100px);
            }
            
            .board-grid[data-size="4"] {
                grid-template-columns: repeat(4, 90px);
            }
            
            .board-grid[data-size="5"] {
                grid-template-columns: repeat(5, 80px);
            }
            
            .board-grid[data-size="6"] {
                grid-template-columns: repeat(6, 70px);
            }
        }
        
        /* تنسيق AdSense */
        ins.adsbygoogle {
            display: block;
            background: transparent;
        }
    </style>
</head>

    <script>
        // متغيرات اللعبة
        let board = [];
        let boardSize = 3;
        let currentPlayer = 'X';

        let gameMode = 'computer';
        let difficulty = 'easy';

        let totalMoves = 0;
        let adsShown = 0;
        let lastMoveIndex = -1;
        let turnCount = 0;

        // تهيئة اللعبة
        document.addEventListener('DOMContentLoaded', () => {
            initGame();
            loadScores();
            setupEventListeners();
            showStartAd();
        });

        function initGame() {
            boardSize = parseInt(document.getElementById('level').value);
            createBoard();
            resetGameState();
            updatePlayerNames();
            updateMovesCounter();
        }

        function createBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            board = Array(boardSize * boardSize).fill('');
            
            boardElement.setAttribute('data-size', boardSize);
            
            for (let i = 0; i < boardSize * boardSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', handleCellClick);
                boardElement.appendChild(cell);
            }
        }

        function handleCellClick(e) {
            if (!gameActive) return;
            
            const index = parseInt(e.target.dataset.index);
            
            if (board[index] !== '') return;
            
            if (gameMode === 'twoPlayer') {
                makeMove(index);
                checkGameStatus();
            } else {
                if (currentPlayer === 'X') {
                    makeMove(index);
                    if (checkGameStatus()) {
                        setTimeout(() => makeComputerMove(), 500);
                    }
                }
            }
        }

        function makeMove(index) {
            board[index] = currentPlayer;
            const cell = document.querySelector(`[data-index="${index}"]`);
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());
            
            moves++;
            totalMoves++;
            updateMovesCounter();
            
            turnCount++;
            if (turnCount % 3 === 0 && gameActive) {
                showTurnAd(turnCount);
            }
        }

        function makeComputerMove() {
            if (!gameActive || currentPlayer !== 'O') return;
            
            let move;
            switch(difficulty) {
                case 'easy':
                    move = getRandomMove();
                    break;
                case 'medium':
                    move = getMediumMove();
                    break;
                case 'hard':
                    move = getHardMove();
                    break;
            }
            
            if (move !== undefined) {
                makeMove(move);
                checkGameStatus();
            }
        }

        function getRandomMove() {
            const emptyCells = board.reduce((acc, cell, index) => {
                if (cell === '') acc.push(index);
                return acc;
            }, []);
            
            if (emptyCells.length > 0) {
                return emptyCells[Math.floor(Math.random() * emptyCells.length)];
            }
            return undefined;
        }

        function getMediumMove() {
            const winMove = findWinningMove('O');
            if (winMove !== undefined) return winMove;
            
            const blockMove = findWinningMove('X');
            if (blockMove !== undefined) return blockMove;
            
            return getRandomMove();
        }

        function getHardMove() {
            const winMove = findWinningMove('O');
            if (winMove !== undefined) return winMove;
            
            const blockMove = findWinningMove('X');
            if (blockMove !== undefined) return blockMove;
            
            const center = Math.floor(boardSize * boardSize / 2);
            if (board[center] === '') return center;
            
            const corners = [0, boardSize - 1, boardSize * (boardSize - 1), boardSize * boardSize - 1];
            const availableCorners = corners.filter(i => board[i] === '');
            if (availableCorners.length > 0) {
                return availableCorners[Math.floor(Math.random() * availableCorners.length)];
            }
            
            return getRandomMove();
        }

        function findWinningMove(player) {
            for (let i = 0; i < board.length; i++) {
                if (board[i] === '') {
                    board[i] = player;
                    if (checkWinner() === player) {
                        board[i] = '';
                        return i;
                    }
                    board[i] = '';
                }
            }
            return undefined;
        }

        function checkGameStatus() {
            const winner = checkWinner();
            
            if (winner) {
                gameActive = false;
                scores[winner]++;
                updateScores();
                highlightWinningCells(winner);
                showStatus(winner);
                return false;
            } else if (isBoardFull()) {
                gameActive = false;
                showStatus('draw');
                return false;
            } else {
                switchPlayer();
                return true;
            }
        }

        function checkWinner() {
            const size = boardSize;
            
            // الأفقية
            for (let row = 0; row < size; row++) {
                const first = board[row * size];
                if (first === '') continue;
                let win = true;
                for (let col = 1; col < size; col++) {
                    if (board[row * size + col] !== first) {
                        win = false;
                        break;
                    }
                }
                if (win) return first;
            }
            
            // العمودية
            for (let col = 0; col < size; col++) {
                const first = board[col];
                if (first === '') continue;
                let win = true;
                for (let row = 1; row < size; row++) {
                    if (board[row * size + col] !== first) {
                        win = false;
                        break;
                    }
                }
                if (win) return first;
            }
            
            // القطر الرئيسي
            let first = board[0];
            if (first !== '') {
                let win = true;
                for (let i = 1; i < size; i++) {
                    if (board[i * size + i] !== first) {
                        win = false;
                        break;
                    }
                }
                if (win) return first;
            }
            
            // القطر الثانوي
            first = board[size - 1];
            if (first !== '') {
                let win = true;
                for (let i = 1; i < size; i++) {
                    if (board[i * size + (size - 1 - i)] !== first) {
                        win = false;
                        break;
                    }
                }
                if (win) return first;
            }
            
            return null;
        }

        function highlightWinningCells(winner) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => cell.classList.remove('win'));
            
            for (let i = 0; i < board.length; i++) {
                if (board[i] === winner) {
                    cells[i].classList.add('win');
                }
            }
        }

        function isBoardFull() {
            return board.every(cell => cell !== '');
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('currentPlayerDisplay').textContent = currentPlayer;
        }

        function updateMovesCounter() {
            const maxMoves = boardSize * boardSize;
            document.getElementById('movesCounter').textContent = `${moves}/${maxMoves}`;
            document.getElementById('totalMoves').textContent = totalMoves;
        }

        function updateScores() {
            document.getElementById('scoreX').textContent = scores.X;
            document.getElementById('scoreO').textContent = scores.O;
            saveScores();
        }

        function updatePlayerNames() {
            if (gameMode === 'computer') {
                document.getElementById('player1Label').textContent = 'X';
                document.getElementById('player2Label').textContent = 'كمبيوتر';
                document.getElementById('difficultyGroup').style.display = 'block';
            } else {
                document.getElementById('player1Label').textContent = 'X';
                document.getElementById('player2Label').textContent = 'O';
                document.getElementById('difficultyGroup').style.display = 'none';
            }
        }

        function showStatus(result) {
            const display = document.getElementById('currentPlayerDisplay');
            if (result === 'X') {
                display.textContent = '❌ فاز!';
            } else if (result === 'O') {
                display.textContent = '⭕ فاز!';
            } else if (result === 'draw') {
                display.textContent = 'تعادل!';
            }
        }

        function resetGame() {
            board = Array(boardSize * boardSize).fill('');
            currentPlayer = 'X';
            gameActive = true;
            moves = 0;
            
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.textContent = '';
                cell.classList.remove('x', 'o', 'win');
            });
            
            updateDisplay();
            updateMovesCounter();
        }

        function resetGameState() {
            resetGame();
        }

        function resetScores() {
            if (confirm('هل أنت متأكد من تصفير النقاط؟')) {
                scores = { X: 0, O: 0 };
                updateScores();
                resetGame();
            }
        }

        function saveScores() {
            localStorage.setItem('xoScores', JSON.stringify(scores));
        }

        function loadScores() {
            const saved = localStorage.getItem('xoScores');
            if (saved) {
                scores = JSON.parse(saved);
                updateScores();
            }
        }

        function changeGameMode() {
            gameMode = document.getElementById('gameMode').value;
            updatePlayerNames();
            resetGame();
        }

        function changeLevel() {
            initGame();
            resetGame();
        }

        // نظام الإعلانات
        function showStartAd() {
            const startAd = document.getElementById('startAd');
            if (startAd) {
                startAd.style.display = 'block';
                adsShown++;
                updateAdStats();
                
                try {
                    (adsbygoogle = window.adsbygoogle || []).push({});
                } catch (e) {}
                
                setTimeout(() => {
                    closeStartAd();
                }, 7000);
            }
        }

        function closeStartAd() {
            const startAd = document.getElementById('startAd');
            if (startAd) {
                startAd.style.display = 'none';
            }
        }

        function showTurnAd(turnNumber) {
            const turnAd = document.getElementById('turnAdContainer');
            if (turnAd) {
                document.getElementById('turnNumber').textContent = turnNumber;
                turnAd.classList.remove('hidden');
                adsShown++;
                updateAdStats();
                
                try {
                    (adsbygoogle = window.adsbygoogle || []).push({});
                } catch (e) {}
                
                setTimeout(closeTurnAd, 5000);
            }
        }

        function closeTurnAd() {
            const turnAd = document.getElementById('turnAdContainer');
            if (turnAd) {
                turnAd.classList.add('hidden');
            }
        }

        function updateAdStats() {
            document.getElementById('adsShown').textContent = adsShown;
        }

        function setupEventListeners() {
            document.getElementById('difficulty').addEventListener('change', function() {
                difficulty = this.value;
            });
        }
    </script>
</body>
</html>
